<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Book a Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #06090f; color: white; font-family: sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(17, 23, 31, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; flex: 1; }
        .progress-active { background: #00d9ff; box-shadow: 0 0 10px #00d9ff; }
        .console-card { border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; cursor: pointer; }
        .console-active { border-color: #00d9ff; background: rgba(0, 217, 255, 0.05); }
        .btn-cyan { background: #00d9ff; color: #000; font-weight: 800; box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
        input { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: #00d9ff !important; outline: none; }
    </style>
</head>
<body class="p-6">

    <header class="mb-10">
        <button onclick="window.history.back()" class="text-gray-400 hover:text-white transition-all">
            <i class="fas fa-arrow-left mr-2"></i> PRINCEGAMES
        </button>
    </header>

    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Book a session</h1>
        <p id="step-label" class="text-gray-500 text-sm mb-6">Step 1 of 3</p>

        <div class="flex gap-2 mb-10">
            <div id="p1" class="progress-bar progress-active"></div>
            <div id="p2" class="progress-bar"></div>
            <div id="p3" class="progress-bar"></div>
        </div>

        <div id="step1" class="space-y-8">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-4">Choose console</label>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="selectConsole('PS3', 5000, this)" class="console-card p-4 rounded-xl text-center">
                        <p class="font-bold text-sm">PS3</p>
                        <p class="text-[10px] text-gray-500">Rp 5.000/h</p>
                    </div>
                    <div onclick="selectConsole('PS4', 10000, this)" class="console-card p-4 rounded-xl text-center console-active">
                        <p class="font-bold text-sm">PS4</p>
                        <p class="text-[10px] text-gray-500">Rp 10.000/h</p>
                    </div>
                    <div onclick="selectConsole('PS5', 15000, this)" class="console-card p-4 rounded-xl text-center">
                        <p class="font-bold text-sm">PS5</p>
                        <p class="text-[10px] text-gray-500">Rp 15.000/h</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2"><i class="far fa-calendar mr-2"></i> Date</label>
                    <input type="date" id="book-date" class="w-full p-4 rounded-xl text-sm" value="2026-04-20">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2"><i class="far fa-clock mr-2"></i> Time</label>
                    <input type="time" id="book-time" class="w-full p-4 rounded-xl text-sm" value="18:00">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-4">Duration</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setDuration(1, this)" class="py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400">1h</button>
                    <button onclick="setDuration(2, this)" class="py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400">2h</button>
                    <button onclick="setDuration(3, this)" class="py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400">3h</button>
                    <button onclick="setDuration(5, this)" class="py-3 rounded-xl btn-cyan text-xs">5h</button>
                </div>
            </div>

            <button onclick="goToStep(2)" class="w-full btn-cyan py-5 rounded-2xl uppercase tracking-widest text-sm flex justify-center items-center gap-2">
                Continue <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div id="step2" class="hidden space-y-8">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2"><i class="far fa-user mr-2"></i> Full name</label>
                <input type="text" id="cust-name" placeholder="Masukkan nama anda" class="w-full p-4 rounded-xl text-sm" value="fahry">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">Phone (WhatsApp)</label>
                <input type="number" id="cust-phone" placeholder="08..." class="w-full p-4 rounded-xl text-sm" value="087728847564">
            </div>
            <div class="flex gap-3">
                <button onclick="goToStep(1)" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-2xl uppercase text-sm font-bold">Back</button>
                <button onclick="goToStep(3)" class="flex-[2] btn-cyan py-5 rounded-2xl uppercase text-sm flex justify-center items-center gap-2">
                    Continue <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="step3" class="hidden space-y-8">
            <div class="glass-card p-6 rounded-3xl space-y-4 text-sm">
                <div class="flex justify-between"><span class="text-gray-500">Console</span><span id="res-console" class="font-bold">PS4</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Date</span><span id="res-date" class="font-bold">2026-04-20</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Time</span><span id="res-time" class="font-bold">18:00</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Duration</span><span id="res-duration" class="font-bold">5h</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Customer</span><span id="res-name" class="font-bold">fahry</span></div>
                <div class="h-px bg-white/5 my-4"></div>
                <div class="flex justify-between items-center">
                    <span class="font-bold uppercase tracking-widest">Total</span>
                    <span id="res-total" class="text-xl font-black text-cyan-400 tracking-tighter">Rp 50.000</span>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-4">Payment method</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPay('Cash', this)" class="py-4 rounded-xl bg-white/5 border border-white/10 text-xs">Cash</button>
                    <button onclick="setPay('Ewallet', this)" class="py-4 rounded-xl btn-cyan text-xs">Ewallet</button>
                    <button onclick="setPay('Card', this)" class="py-4 rounded-xl bg-white/5 border border-white/10 text-xs">Card</button>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="goToStep(2)" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-2xl uppercase text-sm font-bold">Back</button>
                <button onclick="confirmBooking()" class="flex-[2] btn-cyan py-5 rounded-2xl uppercase text-sm flex justify-center items-center gap-2">
                    <i class="fas fa-check"></i> Confirm booking
                </button>
            </div>
        </div>

        <div id="success-screen" class="hidden fixed inset-0 bg-[#06090f] z-[100] flex items-center justify-center p-6">
            <div class="glass-card p-10 rounded-[40px] w-full max-w-sm text-center border-cyan-500/30">
                <div class="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-500/30">
                    <i class="fas fa-check text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">Booking confirmed!</h2>
                <p class="text-gray-400 text-sm mb-8">See you on <span id="final-date" class="text-white font-bold">2026-04-20</span> at <span id="final-time" class="text-white font-bold">18:00</span></p>
                
                <div class="text-left space-y-3 text-xs mb-10">
                    <div class="flex justify-between"><span class="text-gray-500">Booking ID</span><span class="font-mono text-cyan-400">H872AYNE</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Console</span><span id="fin-console">PS4</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Duration</span><span id="fin-dur">5h</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Payment</span><span id="fin-pay">Ewallet</span></div>
                    <div class="h-px bg-white/5 my-2"></div>
                    <div class="flex justify-between font-bold text-sm"><span>Total</span><span id="fin-total" class="text-cyan-400">Rp 50.000</span></div>
                </div>

                <div class="flex gap-3">
                    <button onclick="location.href='index.html'" class="flex-1 bg-white/5 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-home mr-2"></i> Home</button>
                    <button onclick="location.href='dashboard-customer.html'" class="flex-[1.5] btn-cyan py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-gamepad mr-2"></i> View Dashboard</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let bookingData = { console: 'PS4', rate: 10000, duration: 5, payment: 'Ewallet' };

        function selectConsole(name, price, el) {
            bookingData.console = name;
            bookingData.rate = price;
            document.querySelectorAll('.console-card').forEach(c => c.classList.remove('console-active'));
            el.classList.add('console-active');
            updateTotal();
        }

        function setDuration(h, el) {
            bookingData.duration = h;
            document.querySelectorAll('#step1 button').forEach(b => { if(b.innerText.includes('h')) { b.className = "py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400"; }});
            el.className = "py-3 rounded-xl btn-cyan text-xs";
            updateTotal();
        }

        function setPay(type, el) {
            bookingData.payment = type;
            document.querySelectorAll('#step3 button').forEach(b => { if(['Cash','Ewallet','Card'].includes(b.innerText)) b.className = "py-4 rounded-xl bg-white/5 border border-white/10 text-xs"; });
            el.className = "py-4 rounded-xl btn-cyan text-xs";
        }

        function updateTotal() {
            const total = bookingData.rate * bookingData.duration;
            document.getElementById('res-total').innerText = 'Rp ' + total.toLocaleString('id-ID');
        }

        function goToStep(s) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step'+s).classList.remove('hidden');
            
            document.getElementById('step-label').innerText = `Step ${s} of 3`;
            document.getElementById('p2').className = s >= 2 ? 'progress-bar progress-active' : 'progress-bar';
            document.getElementById('p3').className = s >= 3 ? 'progress-bar progress-active' : 'progress-bar';

            if(s === 3) {
                document.getElementById('res-console').innerText = bookingData.console;
                document.getElementById('res-date').innerText = document.getElementById('book-date').value;
                document.getElementById('res-time').innerText = document.getElementById('book-time').value;
                document.getElementById('res-duration').innerText = bookingData.duration + 'h';
                document.getElementById('res-name').innerText = document.getElementById('cust-name').value;
                updateTotal();
            }
        }

        function confirmBooking() {
            // Animasi Loading
            Swal.fire({
                title: 'Processing...',
                html: 'Securing your console',
                timer: 1500,
                timerProgressBar: true,
                didOpen: () => { Swal.showLoading() },
                background: '#11171f', color: '#fff'
            }).then(() => {
                document.getElementById('final-date').innerText = document.getElementById('book-date').value;
                document.getElementById('final-time').innerText = document.getElementById('book-time').value;
                document.getElementById('fin-console').innerText = bookingData.console;
                document.getElementById('fin-dur').innerText = bookingData.duration + 'h';
                document.getElementById('fin-pay').innerText = bookingData.payment;
                document.getElementById('fin-total').innerText = document.getElementById('res-total').innerText;
                document.getElementById('success-screen').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
