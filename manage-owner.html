<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Manajemen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #06090f; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-bottom: 100px;
        }

        .glass-card { 
            background: rgba(17, 23, 31, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
        }

        .input-manage {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 15px;
            width: 100%;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .input-manage:focus { border-color: #00d9ff; }

        .btn-cyan {
            background-color: #00d9ff;
            color: #000;
            font-weight: 800;
            transition: all 0.2s;
        }

        .btn-cyan:active { scale: 0.95; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-[450px] mx-auto">
        
        <div class="flex items-center gap-4 mb-8">
            <button onclick="location.href='dashboard-owner.html'" class="w-10 h-10 glass-card flex items-center justify-center">
                <i class="fas fa-chevron-left text-sm text-cyan-400"></i>
            </button>
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tight">Manajemen</h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Kelola Konsol, Unit, dan Menu F&B</p>
            </div>
        </div>

        <div class="glass-card p-5 mb-8">
            <div class="flex items-center gap-2 mb-6">
                <i class="fas fa-microchip text-cyan-400"></i>
                <h3 class="text-xs font-black uppercase tracking-widest">Tipe Konsol</h3>
            </div>
            
            <div class="space-y-3 mb-6">
                <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-xs font-bold text-cyan-400">PS5</span>
                    <span class="text-[11px] text-gray-400">3 Unit - Rp 15.000/jam</span>
                    <div class="flex gap-2">
                        <i class="fas fa-edit text-gray-500 text-xs"></i>
                        <i class="fas fa-trash text-red-500/50 text-xs cursor-pointer"></i>
                    </div>
                </div>
                <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-xs font-bold text-purple-400">PS4</span>
                    <span class="text-[11px] text-gray-400">4 Unit - Rp 10.000/jam</span>
                    <div class="flex gap-2">
                        <i class="fas fa-edit text-gray-500 text-xs"></i>
                        <i class="fas fa-trash text-red-500/50 text-xs cursor-pointer"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <input type="text" class="input-manage" placeholder="ID (e.g PS6)">
                <input type="text" class="input-manage" placeholder="Nama">
            </div>
            <input type="number" class="input-manage mb-4" placeholder="Tarif / jam">
            <button class="w-full py-3 btn-cyan rounded-xl text-xs uppercase tracking-widest">+ Tambah Tipe</button>
        </div>

        <div class="glass-card p-5 mb-8">
            <div class="flex items-center gap-2 mb-6">
                <i class="fas fa-gamepad text-pink-400"></i>
                <h3 class="text-xs font-black uppercase tracking-widest">Unit Fisik</h3>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="p-3 bg-white/5 rounded-xl border border-white/10 flex justify-between items-center">
                    <div>
                        <p class="text-[11px] font-black">PS5-01</p>
                        <p class="text-[8px] text-green-400 font-bold uppercase">Ready</p>
                    </div>
                    <i class="fas fa-trash text-red-500/30 text-[10px] cursor-pointer"></i>
                </div>
                <div class="p-3 bg-white/5 rounded-xl border border-white/10 flex justify-between items-center">
                    <div>
                        <p class="text-[11px] font-black">PS4-03</p>
                        <p class="text-[8px] text-yellow-400 font-bold uppercase">Maintenance</p>
                    </div>
                    <i class="fas fa-trash text-red-500/30 text-[10px] cursor-pointer"></i>
                </div>
            </div>

            <input type="text" class="input-manage mb-3" placeholder="ID Unit (e.g PS5-04)">
            <select class="input-manage mb-4">
                <option>PS5 - PlayStation 5</option>
                <option>PS4 - PlayStation 4</option>
            </select>
            <button class="w-full py-3 btn-cyan rounded-xl text-xs uppercase tracking-widest">+ Tambah Unit</button>
        </div>

        <div class="glass-card p-5 mb-8">
            <div class="flex items-center gap-2 mb-6">
                <i class="fas fa-utensils text-yellow-400"></i>
                <h3 class="text-xs font-black uppercase tracking-widest">Menu F&B</h3>
            </div>

            <div class="space-y-3 mb-6">
                <div class="flex items-center justify-between p-3 bg-white/3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <span class="text-lg">🍜</span>
                        <div>
                            <p class="text-[11px] font-bold">Indomie Goreng</p>
                            <p class="text-[9px] text-gray-500">Food • Rp 12.000</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <i class="fas fa-edit text-gray-500 text-xs"></i>
                        <i class="fas fa-trash text-red-500/30 text-xs cursor-pointer"></i>
                    </div>
                </div>
                <div class="flex items-center justify-between p-3 bg-white/3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <span class="text-lg">🍹</span>
                        <div>
                            <p class="text-[11px] font-bold">Es Teh Manis</p>
                            <p class="text-[9px] text-gray-500">Drink • Rp 5.000</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <i class="fas fa-edit text-gray-500 text-xs"></i>
                        <i class="fas fa-trash text-red-500/30 text-xs cursor-pointer"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-3">
                <input type="text" class="input-manage text-center" placeholder="Emoji">
                <input type="text" class="input-manage col-span-2" placeholder="Nama Menu">
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <select class="input-manage">
                    <option>Food</option>
                    <option>Drink</option>
                    <option>Snack</option>
                </select>
                <input type="number" class="input-manage" placeholder="Harga">
            </div>
            <button class="w-full py-3 btn-cyan rounded-xl text-xs uppercase tracking-widest">+ Tambah Menu</button>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 glass-card !rounded-t-3xl !rounded-b-none border-t border-white/10 p-4 flex justify-around items-center z-50">
        <div onclick="location.href='dashboard-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Dashboard</span>
        </div>
        <div class="flex flex-col items-center text-cyan-400 cursor-pointer">
            <i class="fas fa-tasks text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Manage</span>
        </div>
        <div onclick="location.href='history-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-history text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">History</span>
        </div>
        <div onclick="location.href='export-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-file-export text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Export</span>
        </div>
    </div>

</body>
</html>
