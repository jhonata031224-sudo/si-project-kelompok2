<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Login Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="w-full px-6 flex flex-col items-center">
        <div class="glass-card">
            <h3 class="text-2xl font-bold mb-2">Akses Staff</h3>
            <p class="text-gray-500 text-sm mb-8">Kelola unit dan pesanan pelanggan.</p>
            
            <div id="error-box" class="error-container"></div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-widest ml-1">Email Bisnis</label>
                    <input type="email" id="email" placeholder="email@gmail.com" class="input-field">
                
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-widest ml-1">Kata Sandi</label>
                    <input type="password" id="password" placeholder="********" class="input-field">
                </div>
                <button onclick="handleLoginStaff()" class="btn-cyan">
                    Masuk Dashboard
                </button>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-gray-500">Belum punya akses tim? <a href="daftar-staff.html" class="text-cyan-400 font-bold">Daftar Staff</a></p>
                <a href="index.html" class="block mt-6 text-xs text-gray-400 underline decoration-gray-800">Kembali ke Pelanggan</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
