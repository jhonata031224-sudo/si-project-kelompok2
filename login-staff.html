<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Login Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .password-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #4b5563;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-password:hover { color: #00d9ff; }
        .input-field { width: 100%; }
    </style>
</head>
<body>
    <div class="w-full px-6 flex flex-col items-center">
        <div class="glass-card mt-10">
            <h3 class="text-2xl font-bold mb-2">Akses Staff</h3>
            <p class="text-gray-500 text-sm mb-8">Kelola unit dan pesanan pelanggan.</p>
            
            <div id="error-box" class="error-container"></div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-widest ml-1">Email Bisnis</label>
                    <input type="email" id="email" placeholder="email@gmail.com" class="input-field">
                </div>

                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-widest ml-1">Kata Sandi</label>
                    <div class="password-wrapper mt-1">
                        <input type="password" id="password" placeholder="********" class="input-field !mt-0">
                        <span class="toggle-password" onclick="togglePass('password', 'eyeLogin')">
                            <i class="fas fa-eye" id="eyeLogin"></i>
                        </span>
                    </div>
                </div>

                <button onclick="validatedLogin()" class="btn-cyan">Masuk Dashboard</button>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-gray-500">Belum punya akses tim? <a href="daftar-staff.html" class="text-cyan-400 font-bold">Daftar Staff</a></p>
            </div>
        </div>
    </div>

    <script>
        let attempts = 0;

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function validatedLogin() {
            attempts++;
            if (attempts >= 5) {
                document.getElementById('email').value = "";
                document.getElementById('password').value = "";
                attempts = 0; 
                Swal.fire({
                    icon: 'warning',
                    title: 'Keamanan Aktif',
                    text: 'Terlalu banyak percobaan salah. Form telah dikosongkan.',
                    background: '#11171f',
                    color: '#fff'
                });
                return;
            }
            if (typeof handleLoginStaff === "function") {
                handleLoginStaff();
            }
        }
    </script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
