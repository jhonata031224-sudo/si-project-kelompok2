<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Daftar Owner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #4b5563;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-password:hover { color: #00d9ff; }
        .input-field { width: 100%; }
    </style>
</head>
<body class="p-6">
    <div class="w-full max-w-[380px] mx-auto mt-10">
        <div class="text-center mb-8">
            <i class="fas fa-crown text-4xl text-yellow-500 mb-3"></i>
            <h2 class="text-2xl font-black tracking-tighter uppercase leading-none">Registrasi <br><span class="text-cyan-400">Owner System</span></h2>
        </div>
        
        <div class="glass-card p-6">
            <h3 class="text-xl font-bold mb-4">Buat Akses Owner</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Email Utama Owner</label>
                    <input type="email" id="reg-owner-email" value="turupreset@gmail.com" class="input-field mt-1 opacity-80" readonly>
                    <p class="text-[8px] text-yellow-500 mt-1">* Email ini terkunci untuk keamanan akses owner.</p>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Nama Lengkap</label>
                    <input type="text" id="reg-owner-nama" placeholder="Masukkan nama Bos" class="input-field mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Kata Sandi Baru</label>
                    <div class="password-wrapper mt-1">
                        <input type="password" id="reg-owner-pass" placeholder="Minimal 8 karakter" class="input-field !mt-0">
                        <span class="toggle-password" onclick="togglePass('reg-owner-pass', 'eyeOwnerReg')">
                            <i class="fas fa-eye" id="eyeOwnerReg"></i>
                        </span>
                    </div>
                </div>
                
                <button onclick="validatedOwnerRegister()" class="btn-cyan mt-6 w-full py-4 shadow-[0_0_20px_rgba(0,217,255,0.2)]">
                    DAFTARKAN OWNER <i class="fas fa-check-circle text-[10px] ml-2"></i>
                </button>
            </div>

            <p class="text-center text-[11px] text-gray-500 mt-6">
                Sudah punya akun? <a href="login-owner.html" class="text-cyan-400 font-bold">Masuk di sini</a>
            </p>
        </div>
    </div>

    <script>
        let ownerRegAttempts = 0;

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function validatedOwnerRegister() {
            ownerRegAttempts++;
            if (ownerRegAttempts >= 5) {
                document.getElementById('reg-owner-nama').value = "";
                document.getElementById('reg-owner-pass').value = "";
                ownerRegAttempts = 0;
                Swal.fire({
                    icon: 'warning',
                    title: 'Batas Input',
                    text: 'Terlalu banyak percobaan daftar. Form dikosongkan.',
                    background: '#11171f', color: '#fff'
                });
                return;
            }
            if (typeof handleRegisterOwner === "function") handleRegisterOwner();
        }
    </script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
