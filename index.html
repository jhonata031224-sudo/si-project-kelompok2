<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #06090f; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .glass-card { background: rgba(17, 23, 31, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 217, 255, 0.1); }
    </style>
</head>
<body class="px-6">
    <div class="glass-card p-8 rounded-3xl w-full max-w-sm shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <div class="text-center mb-8">
            <i class="fas fa-gamepad text-4xl text-cyan-400 mb-3"></i>
            <h1 class="text-xl font-black uppercase tracking-tighter">Prince<span class="text-cyan-400">Games</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Portal Masuk Pelanggan</p>
        </div>

        <div class="space-y-4">
            <input type="text" placeholder="Nomor WhatsApp" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs focus:border-cyan-400 outline-none transition-all">
            <input type="password" placeholder="Kata Sandi" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs focus:border-cyan-400 outline-none transition-all">
            <button onclick="location.href='dashboard-customer.html'" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl shadow-[0_0_20px_rgba(0,217,255,0.3)] active:scale-95 transition-all text-xs uppercase tracking-widest">Masuk Sekarang</button>
        </div>

        <p class="text-center text-[10px] text-gray-500 mt-8 uppercase">Belum punya akun? <a href="register.html" class="text-cyan-400 font-bold">Daftar</a></p>
        <div class="mt-4 text-center">
            <a href="staff-access.html" class="text-[9px] text-gray-600 uppercase hover:text-cyan-400 transition-all">Akses Staf & Owner</a>
        </div>
    </div>
</body>
</html>
