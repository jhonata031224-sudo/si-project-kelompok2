<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #0b0e14; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-bottom: 100px;
        }

        * { font-style: normal !important; }

        .glass-card { 
            background: #11171f; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px;
        }
        
        .border-ps5 { border-left: 6px solid #00d9ff; } 
        .border-ps4 { border-left: 6px solid #A020F0; } 
        .border-ps3 { border-left: 6px solid #C0C0C0; }

        .btn-action {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }

        .btn-action:active { transform: scale(0.95); }

        .notif-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-cyan-400">OPERATIONS</h1>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Live Monitoring Unit</p>
        </div>
        <div class="relative">
            <button onclick="toggleNotif()" class="w-12 h-12 glass-card flex items-center justify-center text-gray-400 relative">
                <i class="fas fa-bell"></i>
                <span id="notif-dot" class="hidden absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
        </div>
    </header>

    <div id="notif-panel" class="hidden fixed top-20 right-4 left-4 z-[100] glass-card p-5 shadow-2xl border-cyan-400/20 max-h-[400px] overflow-y-auto">
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-white/5">
            <h3 class="text-xs font-black uppercase tracking-widest">Aktivitas Terbaru</h3>
            <button onclick="hapusSemuaNotif()" class="text-[10px] font-bold text-red-500 uppercase">Hapus Semua</button>
        </div>
        <div id="notif-list" class="space-y-3 text-[11px]"></div>
    </div>

    <div id="unit-grid" class="grid grid-cols-1 gap-4 mb-20"></div>

    <div class="fixed bottom-0 left-0 right-0 glass-card !rounded-t-3xl !rounded-b-none border-t border-white/10 p-4 flex justify-around items-center z-50">
        <div class="flex flex-col items-center text-cyan-400">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Beranda</span>
        </div>
        <div onclick="location.href='history-staff.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-history text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Riwayat</span>
        </div>
    </div>

    <script>
        // Data Unit (12 PS3, 3 PS4, 1 PS5)
        let psUnits = [];
        
        // Tambah PS5 (1 unit)
        psUnits.push({ id: '01', type: 'PS5', status: 'Tersedia', startTime: '-', endTime: '-', price: 0, timeLeft: '00:00:00' });
        
        // Tambah PS4 (3 unit)
        for(let i=1; i<=3; i++) {
            psUnits.push({ id: '0' + i, type: 'PS4', status: 'Tersedia', startTime: '-', endTime: '-', price: 0, timeLeft: '00:00:00' });
        }
        
        // Tambah PS3 (12 unit)
        for(let i=1; i<=12; i++) {
            psUnits.push({ id: (i < 10 ? '0'+i : i), type: 'PS3', status: 'Tersedia', startTime: '-', endTime: '-', price: 0, timeLeft: '00:00:00' });
        }

        let historyNotif = [];

        function renderUI() {
            const container = document.getElementById('unit-grid');
            container.innerHTML = "";

            psUnits.forEach((unit, index) => {
                const isPlaying = unit.status === 'Digunakan';
                const isMaint = unit.status === 'Maintenance';
                const statusColor = isPlaying ? 'text-green-400' : (isMaint ? 'text-yellow-500' : 'text-cyan-400');

                container.innerHTML += `
                    <div class="glass-card p-5 border-${unit.type.toLowerCase()}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-black">${unit.type} - ${unit.id}</h3>
                                <span class="text-[9px] font-bold uppercase ${statusColor}">${unit.status}</span>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 font-bold uppercase">Sisa Waktu</p>
                                <p class="text-lg font-black ${isPlaying ? 'text-white' : 'text-gray-800'}">${unit.timeLeft}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2 mb-5 py-3 border-y border-white/5">
                            <div class="text-center border-r border-white/5">
                                <p class="text-[8px] text-gray-500 font-bold uppercase">Mulai</p>
                                <p class="text-[11px] font-bold">${unit.startTime}</p>
                            </div>
                            <div class="text-center border-r border-white/5">
                                <p class="text-[8px] text-gray-500 font-bold uppercase">Selesai</p>
                                <p class="text-[11px] font-bold">${unit.endTime}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] text-gray-500 font-bold uppercase">Harga</p>
                                <p class="text-[11px] font-bold text-green-400">Rp ${unit.price.toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            ${!isPlaying ? `
                                <button onclick="startSesi(${index})" class="flex-1 py-3 bg-cyan-400 text-black font-black rounded-xl text-[10px] uppercase">START SESI</button>
                                <button onclick="toggleMaint(${index})" class="w-12 h-12 btn-action rounded-xl flex items-center justify-center">
                                    <i class="fas fa-tools text-xs ${isMaint ? 'text-cyan-400' : 'text-yellow-500'}"></i>
                                </button>
                            ` : `
                                <button onclick="tambahWaktu(${index})" class="flex-1 py-3 btn-action rounded-xl text-[9px] font-bold">+1 JAM</button>
                                <button onclick="selesaiSesi(${index})" class="flex-1 py-3 bg-red-500 text-white font-black rounded-xl text-[10px] uppercase">STOP</button>
                            `}
                        </div>
                    </div>`;
            });
        }

        window.startSesi = (index) => {
            if(psUnits[index].status === 'Maintenance') return;
            Swal.fire({
                title: 'Durasi Main',
                background: '#11171f', color: '#fff',
                input: 'number', inputPlaceholder: 'Jam',
                confirmButtonText: 'MULAI',
                confirmButtonColor: '#00d9ff'
            }).then((res) => {
                if(res.value) {
                    const now = new Date();
                    psUnits[index].status = 'Digunakan';
                    psUnits[index].startTime = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                    psUnits[index].price = res.value * 10000; // Harga simulasi
                    tambahNotif(`Sesi Dimulai: ${psUnits[index].type}-${psUnits[index].id}`);
                    renderUI();
                }
            });
        };

        window.selesaiSesi = (index) => {
            tambahNotif(`Sesi Selesai: ${psUnits[index].type}-${psUnits[index].id}`);
            psUnits[index].status = 'Tersedia';
            psUnits[index].startTime = '-'; psUnits[index].endTime = '-'; psUnits[index].price = 0;
            renderUI();
        };

        window.tambahWaktu = (index) => {
            psUnits[index].price += 10000;
            tambahNotif(`Tambah Waktu: ${psUnits[index].type}-${psUnits[index].id}`);
            Swal.fire({ toast:true, position:'top', icon:'success', title:'+1 Jam Ditambahkan', showConfirmButton:false, timer:1500 });
            renderUI();
        };

        window.toggleMaint = (index) => {
            psUnits[index].status = psUnits[index].status === 'Maintenance' ? 'Tersedia' : 'Maintenance';
            renderUI();
        };

        function tambahNotif(pesan) {
            const waktu = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            historyNotif.unshift({ pesan, waktu });
            document.getElementById('notif-dot').classList.remove('hidden');
            updateNotifList();
        }

        function updateNotifList() {
            const list = document.getElementById('notif-list');
            list.innerHTML = historyNotif.length ? "" : `<p class="text-center text-gray-600 py-4">Belum ada aktivitas.</p>`;
            historyNotif.forEach((item, i) => {
                list.innerHTML += `
                    <div class="notif-item flex justify-between items-start bg-white/5 p-3 rounded-xl">
                        <div><p class="font-bold text-gray-300">${item.pesan}</p><span class="text-[9px] text-gray-500 uppercase">${item.waktu}</span></div>
                        <button onclick="hapusNotifSatuan(${i})" class="text-gray-600 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>`;
            });
        }

        window.toggleNotif = () => document.getElementById('notif-panel').classList.toggle('hidden');
        window.hapusSemuaNotif = () => { historyNotif = []; updateNotifList(); };
        window.hapusNotifSatuan = (i) => { historyNotif.splice(i, 1); updateNotifList(); };

        renderUI();
    </script>
</body>
</html>
