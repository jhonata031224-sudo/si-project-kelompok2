<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Live Operations Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; }
        .glass-card { background: #11171f; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Warna Sisi Berbeda Tiap Unit */
        .border-ps5 { border-left: 6px solid #FFD700; } /* EMAS */
        .border-ps4 { border-left: 6px solid #A020F0; } /* UNGU */
        .border-ps3 { border-left: 6px solid #C0C0C0; } /* SILVER */
        
        .btn-cyan { background-color: #00d9ff; color: #000; font-weight: bold; }
        .btn-add-time { background-color: rgba(0, 217, 255, 0.1); color: #00d9ff; border: 1px solid rgba(0, 217, 255, 0.3); }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <i class="fas fa-arrow-left text-gray-400 cursor-pointer" onclick="window.history.back()"></i>
            <h1 class="font-bold uppercase tracking-tighter text-sm">PRINCEGAMES <span class="bg-white/10 px-2 py-0.5 rounded text-[9px] ml-2 text-gray-500">STAFF</span></h1>
        </div>
        <button onclick="location.reload()" class="text-[10px] text-gray-500 uppercase tracking-widest"><i class="fas fa-sync-alt"></i> Refresh</button>
    </header>

    <section class="mb-8 text-center md:text-left">
        <h2 class="text-3xl font-bold mb-2">Live Operations</h2>
        <div class="flex justify-center md:justify-start gap-4 text-[11px] font-bold uppercase tracking-widest">
            <span id="active-count" class="text-green-500">0 active</span>
            <span id="available-count" class="text-cyan-400">0 available</span>
            <span class="text-gray-500">16 total</span>
        </div>
    </section>

    <main id="admin-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 pb-20"></main>

    <script>
        // Inisialisasi 16 Unit
        const defaultData = [
            { id: '01', type: 'PS5', price: '15.000', status: 'Tersedia' },
            { id: '02', type: 'PS5', price: '15.000', status: 'Tersedia' },
            { id: '03', type: 'PS5', price: '15.000', status: 'Tersedia' },
            { id: '04', type: 'PS4', price: '10.000', status: 'Tersedia' },
            { id: '05', type: 'PS4', price: '10.000', status: 'Tersedia' },
            { id: '06', type: 'PS4', price: '10.000', status: 'Tersedia' }
        ];
        for(let i=7; i<=16; i++) {
            defaultData.push({ id: i.toString().padStart(2, '0'), type: 'PS3', price: '5.000', status: 'Tersedia' });
        }

        let psUnits = JSON.parse(localStorage.getItem('psData')) || defaultData;

        // Fungsi Notifikasi Sistem
        function sysNotify(icon, title) {
            Swal.fire({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2500,
                timerProgressBar: true,
                icon: icon,
                title: title,
                background: '#11171f',
                color: '#fff',
                iconColor: '#00d9ff'
            });
        }

        function renderAdmin() {
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = '';
            let active = 0, available = 0;

            psUnits.forEach((u, index) => {
                const isFull = u.status === 'Penuh';
                const isMaint = u.status === 'Maintenance';
                if(isFull) active++;
                if(u.status === 'Tersedia') available++;

                const borderClass = u.type === 'PS5' ? 'border-ps5' : (u.type === 'PS4' ? 'border-ps4' : 'border-ps3');
                const accentColor = u.type === 'PS5' ? 'text-[#FFD700]' : (u.type === 'PS4' ? 'text-[#A020F0]' : 'text-[#C0C0C0]');

                grid.innerHTML += `
                    <div class="glass-card p-5 rounded-2xl ${borderClass} transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[9px] font-bold ${accentColor} uppercase">${u.type}</p>
                                <h3 class="text-sm font-bold tracking-tight">${u.type}-${u.id}</h3>
                            </div>
                            <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest bg-white/5 px-2 py-1 rounded">
                                ${isMaint ? 'Maintenance' : (isFull ? 'In Use' : 'Available')}
                            </span>
                        </div>
                        <div class="text-2xl font-mono text-gray-800 mb-4 tracking-widest ${isFull ? 'text-cyan-400 animate-pulse' : ''}">
                            ${isFull ? '00 : 45 : 00' : '-- : -- : --'}
                        </div>
                        <p class="text-[10px] text-gray-500 mb-6 font-bold">Rp ${u.price} / Jam</p>
                        <div class="flex flex-col gap-3">
                            <div class="flex gap-2">
                                <button onclick="toggleUnit(${index})" class="flex-1 py-3 rounded-xl text-[10px] font-bold uppercase transition-all ${isFull ? 'bg-red-500/20 text-red-500' : 'btn-cyan'}">
                                    <i class="fas ${isFull ? 'fa-stop' : 'fa-play'} text-[8px] mr-2"></i> ${isFull ? 'Stop' : 'Start'}
                                </button>
                                ${isFull ? `<button onclick="addTime('${u.type}-${u.id}')" class="px-4 py-3 rounded-xl btn-add-time text-[10px] font-bold uppercase">+30 Min</button>` : ''}
                            </div>
                            <button onclick="setMaint(${index})" class="w-full py-2 bg-white/5 text-gray-600 rounded-lg text-[9px] font-bold uppercase">
                                <i class="fas fa-wrench mr-2"></i> ${isMaint ? 'Restore Service' : 'Set Maintenance'}
                            </button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('active-count').innerText = `${active} active`;
            document.getElementById('available-count').innerText = `${available} available`;
            localStorage.setItem('psData', JSON.stringify(psUnits));
        }

        function toggleUnit(i) { 
            const unit = psUnits[i];
            unit.status = unit.status === 'Tersedia' ? 'Penuh' : 'Tersedia';
            const msg = unit.status === 'Penuh' ? `Unit ${unit.type}-${unit.id} Mulai Bermain!` : `Unit ${unit.type}-${unit.id} Telah Berhenti.`;
            sysNotify('success', msg); // Notifikasi Sistem
            renderAdmin(); 
        }

        function setMaint(i) { 
            const unit = psUnits[i];
            unit.status = unit.status === 'Maintenance' ? 'Tersedia' : 'Maintenance';
            const msg = unit.status === 'Maintenance' ? `Unit ${unit.type}-${unit.id} Masuk Perbaikan.` : `Unit ${unit.type}-${unit.id} Siap Digunakan Kembali!`;
            sysNotify('warning', msg); // Notifikasi Sistem
            renderAdmin(); 
        }

        function addTime(id) { 
            sysNotify('info', `Waktu Unit ${id} Berhasil Ditambah 30 Menit!`); // Notifikasi Sistem
        }

        renderAdmin();
    </script>
</body>
</html>
