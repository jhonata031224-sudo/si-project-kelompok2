<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Prince Games – Daftar Staff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--cyan:#00d9ff;--pink:#e040fb;--cyan-dim:rgba(0,217,255,0.12);--bg:#070d14;--card:#0d1520;--border:rgba(255,255,255,0.08);--text:#e8edf5;--muted:#5a6a80;--success:#00e676;--danger:#ff5252}
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
        body{min-height:100vh;display:flex;flex-direction:column;
            background:
                radial-gradient(ellipse 100% 60% at 0% 0%,rgba(0,200,220,0.35) 0%,transparent 55%),
                radial-gradient(ellipse 80% 60% at 100% 100%,rgba(180,0,180,0.28) 0%,transparent 55%),
                radial-gradient(ellipse 60% 40% at 50% 50%,rgba(0,100,140,0.10) 0%,transparent 70%),
                #070d14;}

        .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0}
        .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:-.3px}
        .logo-icon{width:32px;height:32px;background:var(--cyan-dim);border:1px solid rgba(0,217,255,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:14px}
        .logo span{color:var(--cyan)}
        .badge-role{display:flex;align-items:center;gap:5px;background:rgba(0,217,255,0.08);border:1px solid rgba(0,217,255,0.2);border-radius:20px;padding:5px 10px;font-size:10px;color:var(--cyan);font-weight:600}

        .hero{padding:28px 20px 8px}
        .hero h1{font-size:32px;font-weight:800;line-height:1.1;letter-spacing:-1.5px}
        .hero h1 .pink{color:var(--pink)}

        .card{margin:16px 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px 20px;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,217,255,0.4),transparent)}

        .field{margin-bottom:14px}
        .field label{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
        .input-wrap{position:relative;display:flex;align-items:center}
        .input-wrap .icon-left{position:absolute;left:14px;color:var(--muted);font-size:13px;pointer-events:none}
        .input-wrap input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px 12px 38px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
        .input-wrap input::placeholder{color:var(--muted)}
        .input-wrap input:focus{border-color:rgba(0,217,255,0.5);box-shadow:0 0 0 3px rgba(0,217,255,0.08)}
        .input-wrap input.error{border-color:rgba(255,82,82,0.5);box-shadow:0 0 0 3px rgba(255,82,82,0.08)}
        .eye-btn{position:absolute;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:14px;transition:color .2s;display:flex;align-items:center}
        .eye-btn:hover{color:var(--cyan)}

        .strength-bar{display:flex;gap:4px;margin-top:8px}
        .strength-seg{height:3px;flex:1;border-radius:3px;background:var(--border);transition:background .3s}
        .strength-seg.weak{background:#ff5252}
        .strength-seg.medium{background:#ffb400}
        .strength-seg.strong{background:var(--success)}
        .strength-label{font-size:10px;color:var(--muted);margin-top:4px}

        .agree-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0 18px}
        .custom-check{width:18px;height:18px;border:2px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:1px}
        .custom-check.checked{background:var(--cyan);border-color:var(--cyan)}
        .custom-check i{font-size:10px;color:#000;display:none}
        .custom-check.checked i{display:block}
        .agree-text{font-size:12px;color:#8899aa;line-height:1.5}
        .agree-text a{color:var(--cyan);text-decoration:none;font-weight:600}

        .btn-primary{width:100%;background:var(--cyan);color:#000;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:.3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 0 24px rgba(0,217,255,0.25)}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 0 32px rgba(0,217,255,0.4)}
        .btn-primary:active{transform:scale(.98)}
        .btn-primary.loading{opacity:.7;pointer-events:none}
        .btn-primary:disabled{opacity:.4;pointer-events:none;cursor:not-allowed}

        .link-text{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}
        .link-text a{color:var(--cyan);font-weight:700;text-decoration:none}

        .perks{margin:0 16px 20px;padding:18px 20px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:18px}
        .perks-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}
        .perk{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;color:#8899aa}
        .perk:last-child{margin-bottom:0}
        .perk-check{width:18px;height:18px;background:var(--cyan);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .perk-check i{font-size:9px;color:#000}

        .version-bar{text-align:center;padding:0 0 24px;font-size:10px;color:#2a3545;letter-spacing:1px}

        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;z-index:9999;transition:transform .35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:240px;max-width:90vw;white-space:normal}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.success{border-color:rgba(0,230,118,.3)}.toast.success .toast-icon{color:var(--success)}
        .toast.error{border-color:rgba(255,82,82,.3)}.toast.error .toast-icon{color:var(--danger)}
        .toast.warning{border-color:rgba(255,180,0,.3)}.toast.warning .toast-icon{color:#ffb400}
        .toast-icon{font-size:16px;flex-shrink:0}


        @media (min-width: 768px) {
            body { display: flex; flex-direction: column; align-items: center; }
            .topbar { width: 100%; max-width: 100%; }
            .hero, .card, .perks, .version-bar { max-width: 430px; width: 100%; }

            /* Scale down agar 100% zoom = tampil seperti 90% sebelumnya */
            .hero { padding: 20px 20px 6px; }
            .hero h1 { font-size: 26px; letter-spacing: -1px; }
            .card { margin: 12px 16px 12px; padding: 18px 18px; border-radius: 18px; }
            .field { margin-bottom: 10px; }
            .input-wrap input { padding: 10px 12px 10px 36px; font-size: 13px; }
            .btn-primary { padding: 13px; font-size: 13px; }
            .agree-row { margin: 10px 0 14px; }
            .perks { margin: 0 16px 14px; padding: 14px 18px; border-radius: 14px; }
            .perk { margin-bottom: 7px; font-size: 11.5px; }
            .link-text { margin-top: 10px; }
            .version-bar { padding: 0 0 16px; }
        }
        /* ===== DARK/LIGHT THEME TOGGLE ===== */
        body.light-mode{
            --bg:#f0f4f8;--card:#ffffff;--border:rgba(0,0,0,0.08);--text:#1a2332;--muted:#7a8a9a;
        }
        body.light-mode{
            background:
                radial-gradient(ellipse 100% 60% at 0% 0%,rgba(0,180,200,0.15) 0%,transparent 55%),
                radial-gradient(ellipse 80% 60% at 100% 100%,rgba(150,0,150,0.10) 0%,transparent 55%),
                #f0f4f8 !important;
            color:#1a2332 !important;
        }
        body.light-mode .card{background:#fff !important;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
        body.light-mode .input-wrap input{background:rgba(0,0,0,0.04) !important;color:#1a2332 !important;border-color:rgba(0,0,0,0.12) !important}
        body.light-mode .input-wrap input::placeholder{color:#aab0bc !important}
        body.light-mode .version-bar{color:#c0ccd8 !important}
        body.light-mode .perks{background:rgba(0,0,0,0.04) !important}
        body.light-mode .chip{background:rgba(0,0,0,0.06) !important;color:#5a6a80 !important}
        body.light-mode .toast{background:#fff !important;box-shadow:0 8px 32px rgba(0,0,0,0.15) !important}
        body.light-mode .remember span,body.light-mode .agree-text,body.light-mode .link-text,body.light-mode .perk{color:#5a6a80 !important}
        body.light-mode .card-sub{color:#7a8a9a !important}
        body.light-mode .hero p{color:#7a8a9a !important}

        .theme-toggle{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:5px 11px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all .2s;white-space:nowrap}
        .theme-toggle:hover{background:rgba(0,217,255,0.1);border-color:rgba(0,217,255,0.3);color:var(--cyan)}
        .theme-toggle i{font-size:12px}
        body.light-mode .theme-toggle{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.12);color:#5a6a80}
        body.light-mode .theme-toggle:hover{background:rgba(0,180,200,0.1);color:#009bb5}
        .topbar-right{display:flex;align-items:center;gap:8px}

    </style>
</head>
<body>
    <div class="toast" id="toast"><i class="toast-icon fas fa-check-circle"></i><span id="toast-msg">Berhasil!</span></div>

    <div class="topbar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-id-badge"></i></div>
            PRINCE<span>GAMES</span>
        </div>
        <div class="topbar-right"><button class="theme-toggle" id="themeBtn" onclick="toggleTheme()"><i class="fas fa-sun"></i> Terang</button>
        <div class="badge-role"><i class="fas fa-shield-halved"></i> Staff</div></div>
    </div>

    <div class="hero">
        <h1>Bergabung jadi<br><span class="pink">Tim Staff.</span></h1>
    </div>

    <div class="card">
        <div class="field">
            <label>Email</label>
            <div class="input-wrap">
                <i class="icon-left fas fa-envelope"></i>
                <input type="email" id="staff-email" placeholder="Masukan Email" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" maxlength="50">
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="icon-left fas fa-lock"></i>
                <input type="password" id="staff-pass" placeholder="Minimal 8 karakter" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" oninput="checkStrength(this.value)">
                <button class="eye-btn" type="button" onclick="togglePass('staff-pass','eyeStaff')">
                    <i class="fas fa-eye" id="eyeStaff"></i>
                </button>
            </div>
            <div class="strength-bar">
                <div class="strength-seg" id="s1"></div>
                <div class="strength-seg" id="s2"></div>
                <div class="strength-seg" id="s3"></div>
                <div class="strength-seg" id="s4"></div>
            </div>
            <div class="strength-label" id="strength-label">Minimal 8 karakter</div>
        </div>

        <button class="btn-primary" id="regBtn" onclick="doRegister()">
            Buat Akun Staff <i class="fas fa-arrow-right"></i>
        </button>

        <div class="link-text">
            Sudah punya akun? <a href="../auth/login-staff.html">Masuk di sini</a>
        </div>
    </div>

    <div class="perks">
        <div class="perks-title">Akses sebagai staff</div>
        <div class="perk"><div class="perk-check"><i class="fas fa-check"></i></div>Kelola sesi & transaksi real-time</div>
        <div class="perk"><div class="perk-check"><i class="fas fa-check"></i></div>Laporan shift harian otomatis</div>
        <div class="perk"><div class="perk-check"><i class="fas fa-check"></i></div>Notifikasi booking pelanggan</div>
        <div class="perk"><div class="perk-check"><i class="fas fa-check"></i></div>Dashboard performa personal</div>
    </div>

    <div class="version-bar">v0.1 · Prince Games</div>

<script>
    let regAttempts = 0;

    function showToast(type, msg) {
        const t = document.getElementById('toast');
        const icons = {success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle'};
        t.querySelector('.toast-icon').className = 'toast-icon fas ' + (icons[type]||'fa-info-circle');
        document.getElementById('toast-msg').textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3200);
    }
    function togglePass(inputId, iconId) {
        const inp = document.getElementById(inputId);
        const ico = document.getElementById(iconId);
        inp.type = inp.type === 'password' ? 'text' : 'password';
        ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }
    function checkStrength(val) {
        const segs = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
        const label = document.getElementById('strength-label');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        segs.forEach((s, i) => {
            s.className = 'strength-seg';
            if (i < score) s.classList.add(score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong');
        });
        if (!val) label.textContent = 'Minimal 8 karakter';
        else if (score <= 1) label.textContent = 'Lemah – tambah angka atau huruf besar';
        else if (score <= 2) label.textContent = 'Sedang – tambah simbol untuk lebih kuat';
        else if (score <= 3) label.textContent = 'Kuat';
        else label.textContent = '✓ Sangat kuat!';
    }
    function setLoading(on) {
        const btn = document.getElementById('regBtn');
        btn.classList.toggle('loading', on);
        btn.innerHTML = on ? '<i class="fas fa-spinner fa-spin"></i> Mendaftar...' : 'Buat Akun Staff <i class="fas fa-arrow-right"></i>';
    }
    async function doRegister() {
        const email = document.getElementById('staff-email').value.trim();
        const pass = document.getElementById('staff-pass').value;

        document.getElementById('staff-email').classList.remove('error');
        document.getElementById('staff-pass').classList.remove('error');

        if (!email || !/\S+@\S+\.\S+/.test(email)) {
            document.getElementById('staff-email').classList.add('error');
            showToast('error', 'Format email tidak valid!'); return;
        }
        if (email.length > 50) {
            document.getElementById('staff-email').classList.add('error');
            showToast('error', 'Email maksimal 50 karakter!'); return;
        }
        if (pass.length < 8) {
            document.getElementById('staff-pass').classList.add('error');
            showToast('error', 'Password minimal 8 karakter!'); return;
        }
        regAttempts++;
        if (regAttempts >= 5) {
            document.getElementById('staff-email').value = '';
            document.getElementById('staff-pass').value = '';
            regAttempts = 0;
            showToast('warning', 'Terlalu banyak percobaan. Form dikosongkan.');
            return;
        }

        setLoading(true);
        if (typeof handleRegisterStaff === 'function') {
            await handleRegisterStaff();
            setLoading(false);
        } else {
            setTimeout(() => { setLoading(false); showToast('error', 'Fungsi daftar belum tersedia.'); }, 1000);
        }
    }

    window.showToast = showToast;
    window.setLoading = setLoading;
</script>
<script type="module" src="../../assets/js/auth.js"></script>

<script>
    (function(){
        const saved = localStorage.getItem('pg_theme');
        if(saved === 'light') document.body.classList.add('light-mode');
    })();
    function toggleTheme(){
        const isLight = document.body.classList.toggle('light-mode');
        localStorage.setItem('pg_theme', isLight ? 'light' : 'dark');
        updateThemeBtn();
    }
    function updateThemeBtn(){
        const btn = document.getElementById('themeBtn');
        if(!btn) return;
        const isLight = document.body.classList.contains('light-mode');
        btn.innerHTML = isLight
            ? '<i class="fas fa-moon"></i> Gelap'
            : '<i class="fas fa-sun"></i> Terang';
    }
    document.addEventListener('DOMContentLoaded', updateThemeBtn);
</script>
</body>
</html>
