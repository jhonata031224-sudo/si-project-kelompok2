<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Laporan Ekspor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #06090f; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-bottom: 120px;
        }

        /* Menghilangkan semua gaya miring */
        * { font-style: normal !important; }

        .glass-card { 
            background: rgba(17, 23, 31, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
        }

        .btn-filter { 
            padding: 15px; 
            border-radius: 18px; 
            background: rgba(255,255,255,0.03); 
            transition: 0.3s; 
            cursor: pointer; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        .btn-filter.active { 
            background: rgba(0, 217, 255, 0.1); 
            border-color: #00d9ff; 
            color: #00d9ff; 
        }

        .btn-action { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            font-weight: 700; 
            font-size: 13px; 
            transition: 0.2s; 
        }
        
        .bg-pdf { background: #e63946; color: white; }
        .bg-excel { background: #2a9d8f; color: white; }
        .bg-share { background: #00d9ff; color: #000; }
        
        .bg-pdf:active, .bg-excel:active, .bg-share:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-6">

    <header class="mb-10">
        <h2 class="text-3xl font-black tracking-tighter text-cyan-400 uppercase">EKSPOR LAPORAN</h2>
        <p class="text-gray-500 text-[11px] font-bold uppercase mt-1 tracking-widest">Manajemen Data Cloud Prince Games</p>
    </header>

    <div class="mb-6">
        <p class="text-[10px] font-bold text-gray-500 uppercase mb-3 tracking-widest">Saring Berdasarkan Tipe</p>
        <div class="grid grid-cols-3 gap-3">
            <div onclick="filterTipe('PS5')" id="f-PS5" class="btn-filter">
                <i class="fas fa-gamepad mb-1 block"></i>
                <span class="text-[11px] font-extrabold">PS5</span>
            </div>
            <div onclick="filterTipe('PS4')" id="f-PS4" class="btn-filter">
                <i class="fas fa-gamepad mb-1 block"></i>
                <span class="text-[11px] font-extrabold">PS4</span>
            </div>
            <div onclick="filterTipe('PS3')" id="f-PS3" class="btn-filter">
                <i class="fas fa-gamepad mb-1 block"></i>
                <span class="text-[11px] font-extrabold">PS3</span>
            </div>
        </div>
    </div>

    <div class="glass-card p-8 mb-8 text-center border-t-4 border-t-cyan-400">
        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-3">Total Pendapatan</p>
        <h1 id="total-text" class="text-4xl font-black text-white">Rp 0</h1>
        <div class="mt-4 inline-block px-4 py-1 rounded-full bg-white/5 border border-white/10">
            <p id="count-text" class="text-[10px] text-cyan-400 font-bold uppercase">0 Transaksi Tersedia</p>
        </div>
    </div>

    <div class="space-y-4">
        <button onclick="unduhPDF()" class="btn-action bg-pdf">
            <i class="fas fa-file-pdf text-lg"></i> SIMPAN SEBAGAI PDF
        </button>
        <button onclick="unduhExcel()" class="btn-action bg-excel">
            <i class="fas fa-file-excel text-lg"></i> SIMPAN SEBAGAI EXCEL
        </button>
        <button onclick="bagikanLaporan()" class="btn-action bg-share">
            <i class="fas fa-share-alt text-lg"></i> BAGIKAN RINGKASAN
        </button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass-card !rounded-t-3xl !rounded-b-none border-t border-white/10 p-4 flex justify-around items-center z-50">
        <div onclick="location.href='dashboard-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Beranda</span>
        </div>
        <div onclick="location.href='manage-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-tasks text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Kelola</span>
        </div>
        <div onclick="location.href='history-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-history text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Riwayat</span>
        </div>
        <div class="flex flex-col items-center text-cyan-400 cursor-pointer">
            <i class="fas fa-file-export text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Ekspor</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqa9FTlNuVXGHnINFN1qz8-aoGTrn-0g4",
            authDomain: "prince-games-f170a.firebaseapp.com",
            projectId: "prince-games-f170a",
            storageBucket: "prince-games-f170a.firebasestorage.app",
            messagingSenderId: "245728198046",
            appId: "1:245728198046:web:b613645f5f51b9fc3f6a8f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let dataMaster = [];
        let dataTersaring = [];
        let filterAktif = "";

        // Mengambil data history secara real-time
        onSnapshot(collection(db, "history"), (snapshot) => {
            dataMaster = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            perbaruiTampilan();
        });

        // Fungsi Klik Filter PS3/4/5
        window.filterTipe = (tipe) => {
            if (filterAktif === tipe) {
                filterAktif = "";
                document.getElementById(`f-${tipe}`).classList.remove('active');
            } else {
                document.querySelectorAll('.btn-filter').forEach(el => el.classList.remove('active'));
                filterAktif = tipe;
                document.getElementById(`f-${tipe}`).classList.add('active');
            }
            perbaruiTampilan();
        };

        function perbaruiTampilan() {
            dataTersaring = filterAktif ? dataMaster.filter(d => d.type === filterAktif) : dataMaster;
            
            const total = dataTersaring.reduce((acc, item) => acc + (parseInt(item.total.toString().replace(/[^0-9]/g, '')) || 0), 0);
            document.getElementById('total-text').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('count-text').innerText = `${dataTersaring.length} Transaksi Ditemukan`;

            if (filterAktif && dataTersaring.length === 0) {
                pesanToast('info', `Tidak ada data untuk ${filterAktif}`);
            }
        }

        // Fungsi Unduh PDF
        window.unduhPDF = () => {
            if (dataTersaring.length === 0) return pesanPeringatan("Data Kosong", "Belum ada transaksi untuk diunduh.");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "normal");
            doc.text(`Laporan Pendapatan Prince Games - ${filterAktif || 'Semua Tipe'}`, 14, 20);
            
            const rows = dataTersaring.map(d => [d.date || '-', d.type + '-' + d.unitID, d.duration || '-', d.total]);
            doc.autoTable({ head: [['Tanggal', 'Unit', 'Durasi', 'Total']], body: rows, startY: 30 });
            doc.save(`Laporan_PrinceGames_${new Date().toLocaleDateString()}.pdf`);
        };

        // Fungsi Unduh Excel
        window.unduhExcel = () => {
            if (dataTersaring.length === 0) return pesanPeringatan("Data Kosong", "Tidak ada data untuk dikonversi ke Excel.");

            const ws = XLSX.utils.json_to_sheet(dataTersaring);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Laporan_PrinceGames.xlsx`);
        };

        // Fungsi Bagikan
        window.bagikanLaporan = async () => {
            if (dataTersaring.length === 0) return pesanToast('info', 'Tidak ada data untuk dibagikan.');

            const totalVal = document.getElementById('total-text').innerText;
            const pesan = `*RINGKASAN PRINCE GAMES*\nFilter: ${filterAktif || 'Semua'}\nTotal Pendapatan: ${totalVal}\nJumlah Transaksi: ${dataTersaring.length}`;

            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Laporan Prince Games', text: pesan });
                } catch (err) { console.log("Gagal membagikan"); }
            } else {
                Swal.fire({ title: 'Ringkasan Laporan', text: pesan, background: '#11171f', color: '#fff' });
            }
        };

        function pesanToast(icon, title) {
            Swal.fire({ toast: true, position: 'top', showConfirmButton: false, timer: 2000, icon: icon, title: title, background: '#11171f', color: '#fff' });
        }

        function pesanPeringatan(judul, isi) {
            Swal.fire({ icon: 'warning', title: judul, text: isi, background: '#11171f', color: '#fff', confirmButtonColor: '#00d9ff' });
        }
    </script>
</body>
</html>
