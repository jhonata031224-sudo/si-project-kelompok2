<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Daftar Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <div class="w-full px-6 flex flex-col items-center">
        <div class="w-full max-w-[380px] mt-10">
            <h2 class="text-4xl font-bold leading-none">Akses Tim.<br><span class="text-cyan-400">Kelola Dashboard.</span></h2>
            
            <div class="glass-card mt-8">
                <h3 class="text-xl font-bold mb-4">Daftar Akun Staff</h3>
                
                <div id="error-box" class="error-container"></div>

                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-400">Nama Lengkap</label>
                        <input type="text" id="nama-staff" placeholder="Nama lengkap" class="input-field">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Email Bisnis</label>
                        <input type="email" id="email-staff" placeholder="email@gmail.com" class="input-field">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Kata Sandi</label>
                        <input type="password" id="pass-staff" placeholder="Minimal 8 karakter" class="input-field">
                    </div>
                    <button onclick="handleRegisterStaff()" class="btn-cyan mt-4">Daftar Sekarang →</button>
                </div>
                <p class="text-center text-xs text-gray-500 mt-6">Sudah punya akses? <a href="login-staff.html" class="text-cyan-400 font-bold">Masuk</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
