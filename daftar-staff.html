<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Live Operations Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #0b0e14; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        .glass-card { 
            background: #11171f; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px;
        }
        
        .border-ps5 { border-left: 6px solid #00d9ff; } 
        .border-ps4 { border-left: 6px solid #A020F0; } 
        .border-ps3 { border-left: 6px solid #C0C0C0; } 
        
        .btn-cyan { background-color: #00d9ff; color: #000; font-weight: bold; }
        .btn-add { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

        .billing-modal { border-radius: 30px !important; background: #11171f !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 2rem !important; }
        .billing-item { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <i class="fas fa-arrow-left text-gray-400 cursor-pointer hover:text-white" onclick="window.location.href='login-staff.html'"></i>
            <h1 class="font-bold uppercase tracking-tighter text-sm">PRINCEGAMES <span class="bg-white/10 px-2 py-0.5 rounded text-[9px] ml-2 text-gray-500">STAFF</span></h1>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="window.location.href='history-staff.html'" class="text-[10px] text-cyan-400 uppercase tracking-widest font-bold flex items-center gap-2">
                <i class="fas fa-history"></i> History
            </button>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </header>

    <section class="mb-8">
        <h2 class="text-3xl font-black mb-2 tracking-tight">Live Monitor</h2>
        <div class="flex gap-4">
            <span id="active-count" class="text-[10px] font-bold uppercase tracking-widest text-cyan-400">0 active</span>
            <span id="available-count" class="text-[10px] font-bold uppercase tracking-widest text-gray-500">0 available</span>
        </div>
    </section>

    <div id="admin-grid" class="space-y-4 pb-24"></div>

    <script>
        // Data tetap menggunakan localStorage agar sinkron
        let psUnits = JSON.parse(localStorage.getItem('psData')) || [
            { id: '01', type: 'PS5', status: 'Tersedia', price: '15.000' },
            { id: '02', type: 'PS5', status: 'Tersedia', price: '15.000' },
            { id: '03', type: 'PS4', status: 'Tersedia', price: '10.000' },
            { id: '04', type: 'PS3', status: 'Maintenance', price: '5.000' }
        ];

        function sysNotify(icon, title) {
            Swal.fire({
                toast: true, position: 'top', showConfirmButton: false, timer: 2500,
                icon: icon, title: title, background: '#11171f', color: '#fff'
            });
        }

        function renderAdmin() {
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = '';
            let active = 0, available = 0;

            psUnits.forEach((unit, i) => {
                const isFull = unit.status === 'Penuh';
                const isMaint = unit.status === 'Maintenance';
                const borderClass = `border-${unit.type.toLowerCase()}`;
                
                if (isFull) active++;
                if (unit.status === 'Tersedia') available++;

                grid.innerHTML += `
                    <div class="glass-card p-5 ${borderClass} transition-all ${isMaint ? 'opacity-50' : ''}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-lg tracking-tight">${unit.type}-${unit.id}</h3>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">${unit.status}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-cyan-400">Rp ${unit.price}/jam</p>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="handleSession(${i})" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${isFull ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 'btn-cyan'}">
                                <i class="fas ${isFull ? 'fa-stop' : 'fa-play'} mr-2"></i> ${isFull ? 'Stop Sesi' : 'Mulai Sesi'}
                            </button>
                            
                            ${isFull ? `
                                <button onclick="addTime('${unit.type}-${unit.id}')" class="btn-add px-4 rounded-xl text-white">
                                    <i class="fas fa-plus"></i>
                                </button>
                            ` : ''}

                            <button onclick="setMaint(${i})" class="btn-add px-4 rounded-xl text-gray-400">
                                <i class="fas fa-wrench"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('active-count').innerText = `${active} active`;
            document.getElementById('available-count').innerText = `${available} available`;
            localStorage.setItem('psData', JSON.stringify(psUnits));
        }

        function handleSession(index) {
            const unit = psUnits[index];
            if (unit.status === 'Maintenance') return sysNotify('error', 'Unit dalam perbaikan!');

            if (unit.status === 'Penuh') {
                showBillingModal(index);
            } else {
                unit.status = 'Penuh';
                sysNotify('success', `Unit ${unit.type}-${unit.id} Mulai Sesi!`);
                renderAdmin();
            }
        }

        function showBillingModal(index) {
            const unit = psUnits[index];
            Swal.fire({
                background: '#11171f',
                color: '#fff',
                customClass: { popup: 'billing-modal' },
                showConfirmButton: true,
                confirmButtonText: 'Selesaikan & Bayar',
                confirmButtonColor: '#00d9ff',
                showCancelButton: true,
                cancelButtonText: 'Batal',
                html: `
                    <div class="text-left">
                        <p class="text-[10px] font-bold text-cyan-400 uppercase tracking-[0.2em] mb-1">Rincian Pembayaran</p>
                        <h2 class="text-2xl font-black mb-6 tracking-tight">Billing Sesi ${unit.type}-${unit.id}</h2>
                        
                        <div class="billing-item flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Main PS (${unit.type})</p>
                                <p class="text-xs font-bold">5 Jam 0 Menit</p>
                            </div>
                            <p class="text-sm font-black">Rp 75.000</p>
                        </div>

                        <div class="billing-item flex justify-between items-center border-l-2 border-orange-500">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Pesanan F&B</p>
                                <p class="text-xs font-bold">2 Items (Indomie, Kopi)</p>
                            </div>
                            <p class="text-sm font-black">Rp 32.000</p>
                        </div>

                        <div class="mt-8 pt-4 border-t border-white/10 flex justify-between items-end">
                            <div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase">Total Tagihan</p>
                                <p class="text-[9px] text-gray-500 italic">Termasuk PPN & Service</p>
                            </div>
                            <p class="text-3xl font-black text-cyan-400 tracking-tighter">Rp 107.000</p>
                        </div>
                    </div>
                `
            }).then((result) => {
                if (result.isConfirmed) {
                    // Simpan ke History sebelum menghapus status
                    let history = JSON.parse(localStorage.getItem('staffHistory')) || [];
                    history.push({
                        unit: `${unit.type}-${unit.id}`,
                        total: '107.000',
                        date: new Date().toLocaleString()
                    });
                    localStorage.setItem('staffHistory', JSON.stringify(history));

                    psUnits[index].status = 'Tersedia';
                    renderAdmin();
                    sysNotify('success', 'Sesi Selesai & Dicatat ke History!');
                }
            });
        }

        function setMaint(i) { 
            const unit = psUnits[i];
            unit.status = unit.status === 'Maintenance' ? 'Tersedia' : 'Maintenance';
            sysNotify('warning', `Unit ${unit.type}-${unit.id} status diperbarui.`);
            renderAdmin(); 
        }

        function addTime(id) { 
            sysNotify('info', `Tambah waktu unit ${id} berhasil.`);
        }

        window.onload = renderAdmin;
    </script>
</body>
</html>
