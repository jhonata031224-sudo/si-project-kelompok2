<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Dashboard Pelanggan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #06090f; 
            margin-bottom: 100px; 
            display: block; 
            height: auto; 
            overflow-y: auto; 
            color: white;
            font-family: sans-serif;
        }
        .glass-card { 
            background: rgba(17, 23, 31, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .filter-btn { 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #9ca3af;
        }
        .filter-active { 
            background: #00d9ff !important; 
            color: #000 !important; 
            border-color: #00d9ff !important; 
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .unit-card { animation: fadeIn 0.4s ease-out forwards; }
        
        .nav-glass { background: rgba(8, 12, 18, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-booking-system { background-color: #00d9ff; color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(0, 217, 255, 0.3); }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#06090f]/90 z-50 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <i class="fas fa-gamepad text-2xl text-cyan-400"></i>
            <h1 class="text-lg font-bold tracking-tighter uppercase">Prince<span class="text-cyan-400">Games</span></h1>
        </div>
        <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded-full border border-green-500/30 font-bold uppercase">Online</span>
    </header>

    <main class="px-6 mt-6">
        <div class="flex gap-8 mb-6 border-b border-white/5">
            <button onclick="switchTab('units')" id="btn-units" class="pb-2 text-sm font-bold border-b-2 border-cyan-400 text-cyan-400">Unit PS</button>
            <button onclick="switchTab('food')" id="btn-food" class="pb-2 text-sm font-bold text-gray-500">Pesan Makan</button>
        </div>

        <div id="section-units">
            <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-4 text-center">Pilih Jenis Console</h2>
            <div class="flex justify-between gap-2 mb-8">
                <button onclick="filterUnit('PS3', this)" class="filter-btn flex-1 py-3 rounded-xl bg-white/5 text-xs font-semibold">PS3</button>
                <button onclick="filterUnit('PS4', this)" class="filter-btn flex-1 py-3 rounded-xl bg-white/5 text-xs font-semibold">PS4</button>
                <button onclick="filterUnit('PS5', this)" class="filter-btn flex-1 py-3 rounded-xl bg-white/5 text-xs font-semibold">PS5</button>
            </div>

            <div id="unit-container">
                <div id="empty-state" class="text-center py-20 opacity-30">
                    <i class="fas fa-layer-group text-4xl mb-3"></i>
                    <p class="text-sm">Pilih jenis PS di atas</p>
                </div>
                
                <h2 id="section-title" class="hidden text-[11px] font-bold uppercase tracking-[0.2em] text-cyan-400 mb-4 tracking-widest text-center">PlayStation yang Tersedia</h2>
                <div id="unit-grid" class="grid grid-cols-2 gap-3 pb-10">
                </div>
            </div>
        </div>

        <div id="section-food" class="hidden pb-20">
            <h2 class="text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-4 tracking-widest text-center">Menu Snack & Drink</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-3 rounded-2xl text-center">
                    <img src="https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400" class="w-full h-24 object-cover rounded-xl" alt="Mie">
                    <h4 class="text-xs font-bold mt-3">Mie Instan</h4>
                    <p class="text-cyan-400 text-[10px] font-bold mt-1">Rp 6.000</p>
                    <button onclick="notify('success', 'Mie Instan ditambahkan!')" class="w-full mt-3 py-2 bg-cyan-500 text-black rounded-xl text-[9px] font-bold uppercase">Tambah</button>
                </div>
                <div class="glass-card p-3 rounded-2xl text-center">
                    <img src="https://images.unsplash.com/photo-1595981267035-7b04ca84a82d?w=400" class="w-full h-24 object-cover rounded-xl" alt="Minuman">
                    <h4 class="text-xs font-bold mt-3">Es Nutrisari</h4>
                    <p class="text-cyan-400 text-[10px] font-bold mt-1">Rp 4.000</p>
                    <button onclick="notify('success', 'Es Nutrisari ditambahkan!')" class="w-full mt-3 py-2 bg-cyan-500 text-black rounded-xl text-[9px] font-bold uppercase">Tambah</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full nav-glass p-4 flex justify-between items-center z-[100] px-10">
        <div onclick="location.href='index.html'" class="flex flex-col items-center gap-1 cursor-pointer">
            <i class="fas fa-home text-lg text-gray-500 hover:text-cyan-400"></i>
            <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">HOME</span>
        </div>

        <div onclick="location.href='booking.html'" class="btn-booking-system px-10 py-3 rounded-2xl flex items-center gap-2 cursor-pointer transition-all active:scale-95">
            <i class="fas fa-calendar-alt text-sm"></i>
            <span class="text-[10px] font-black uppercase">BOOKING</span>
        </div>

        <div onclick="notify('info', 'Belum ada riwayat transaksi.')" class="flex flex-col items-center gap-1 cursor-pointer">
            <i class="fas fa-history text-lg text-gray-500 hover:text-cyan-400"></i>
            <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">HISTORY</span>
        </div>
    </nav>

    <script>
        const units = [
            { id: '01', type: 'PS5', name: 'VIP PREMIUM', price: '15.000' },
            { id: '02', type: 'PS4', name: 'PS4 REGULER', price: '10.000' },
            { id: '03', type: 'PS4', name: 'PS4 REGULER', price: '10.000' },
            { id: '04', type: 'PS4', name: 'PS4 REGULER', price: '10.000' },
            { id: '05', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '06', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '07', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '08', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '09', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '10', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '11', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '12', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '13', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '14', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '15', type: 'PS3', name: 'PS3 REGULER', price: '5.000' },
            { id: '16', type: 'PS3', name: 'PS3 REGULER', price: '5.000' }
        ];

        function filterUnit(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            btn.classList.add('filter-active');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('section-title').classList.remove('hidden');

            const grid = document.getElementById('unit-grid');
            grid.innerHTML = ''; 

            units.filter(u => u.type === type).forEach(u => {
                grid.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl border border-cyan-500/20 unit-card">
                        <div class="flex justify-between items-start">
                            <h3 class="text-[10px] font-bold tracking-tight">UNIT ${u.id}</h3>
                            <span class="text-[7px] text-green-400 border border-green-500/30 font-bold px-1.5 py-0.5 rounded uppercase">Free</span>
                        </div>
                        <p class="text-[9px] text-cyan-400 font-bold mt-1 uppercase">${u.name}</p>
                        <div class="my-3 font-mono text-gray-500 text-xs">-- : -- : --</div>
                        <p class="text-[8px] text-gray-400">Rp ${u.price} / Jam</p>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            const unitSec = document.getElementById('section-units');
            const foodSec = document.getElementById('section-food');
            const btnU = document.getElementById('btn-units');
            const btnF = document.getElementById('btn-food');

            if(tab === 'units') {
                unitSec.classList.remove('hidden'); foodSec.classList.add('hidden');
                btnU.classList.add('border-b-2', 'border-cyan-400', 'text-cyan-400'); btnU.classList.remove('text-gray-500');
                btnF.classList.remove('border-b-2', 'border-cyan-400', 'text-cyan-400'); btnF.classList.add('text-gray-500');
            } else {
                unitSec.classList.add('hidden'); foodSec.classList.remove('hidden');
                btnF.classList.add('border-b-2', 'border-cyan-400', 'text-cyan-400'); btnF.classList.remove('text-gray-500');
                btnU.classList.remove('border-b-2', 'border-cyan-400', 'text-cyan-400'); btnU.classList.add('text-gray-500');
            }
        }

        function notify(icon, title) {
            Swal.fire({
                toast: true, position: 'top', showConfirmButton: false, timer: 2000,
                icon: icon, title: title, background: '#11171f', color: '#fff'
            });
        }
    </script>
</body>
</html>
