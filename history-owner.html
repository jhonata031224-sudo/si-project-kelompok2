<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Riwayat & Analitik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #06090f; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-bottom: 100px;
        }

        .glass-card { 
            background: rgba(17, 23, 31, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #00d9ff;
            color: #000;
            border-color: #00d9ff;
        }

        .table-header { color: #475569; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .table-cell { font-size: 11px; font-weight: 600; padding: 12px 8px; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-[450px] mx-auto">
        
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <button onclick="location.href='dashboard-owner.html'" class="w-10 h-10 glass-card flex items-center justify-center">
                    <i class="fas fa-chevron-left text-sm text-cyan-400"></i>
                </button>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tight">Riwayat & Analitik</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Laporan Revenue, Sesi, dan Pesanan F&B</p>
                </div>
            </div>
            </div>

        <div class="glass-card p-5 mb-6">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="text-[9px] text-gray-500 font-bold uppercase ml-1">Dari</label>
                    <input type="date" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-xs outline-none mt-1" value="2026-03-27">
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 font-bold uppercase ml-1">Sampai</label>
                    <input type="date" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-xs outline-none mt-1" value="2026-04-26">
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <button class="filter-btn active">Semua</button>
                <button class="filter-btn">PS3</button>
                <button class="filter-btn">PS4</button>
                <button class="filter-btn">PS5</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass-card p-4">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-[9px] text-gray-500 font-black uppercase">Total Revenue</p>
                    <i class="fas fa-chart-line text-green-400 text-[10px]"></i>
                </div>
                <h2 class="text-xl font-black">Rp 107.000</h2>
            </div>
            <div class="glass-card p-4">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-[9px] text-gray-500 font-black uppercase">Revenue F&B</p>
                    <i class="fas fa-utensils text-yellow-400 text-[10px]"></i>
                </div>
                <h2 class="text-xl font-black">Rp 32.000</h2>
            </div>
        </div>

        <div class="glass-card p-2 overflow-hidden mb-8">
            <div class="p-3">
                <h3 class="text-xs font-black uppercase tracking-widest mb-2">Detail Sesi Terbaru</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-white/5">
                            <th class="table-header p-3">Tanggal</th>
                            <th class="table-header p-3">Unit</th>
                            <th class="table-header p-3">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-white/5">
                            <td class="table-cell">26 Apr, 18.10</td>
                            <td class="table-cell font-bold text-cyan-400">PS5-01</td>
                            <td class="table-cell font-black text-green-400">Rp 107.000</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 glass-card !rounded-t-3xl !rounded-b-none border-t border-white/10 p-4 flex justify-around items-center z-50">
        <div onclick="location.href='dashboard-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Dashboard</span>
        </div>
        <div onclick="location.href='manage-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-tasks text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Manage</span>
        </div>
        <div class="flex flex-col items-center text-cyan-400 cursor-pointer">
            <i class="fas fa-history text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">History</span>
        </div>
        <div onclick="location.href='export-owner.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fas fa-file-export text-lg"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Export</span>
        </div>
    </div>
</body>
</html>
